spring.application.name=vollmed
spring.datasource.url=jdbc:mysql://localhost:3306/vollmed
spring.datasource.username=root
spring.datasource.password=5872
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#Secret token para JWT
api.security.token.secret=${JWT_SECRET:12345678}

#No mostrar el trace de error completo en la consola
server.error.include-stacktrace=never

#Puerto
server.port=8888

#Mostrar consulta SQL en consola de forma vertical
Spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
